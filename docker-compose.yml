# ─────────────────────────────────────────────────────────────────────────────
# frdcmp-infra — combined infrastructure stack
#
# One Compose project bringing up every shared backing service on a single host:
#
#   • clickhouse  — centralised logging store (one db + restricted user/project)
#   • valkey      — broker / cache / locks (one ACL user + key prefix/service)
#   • prometheus  — metrics scraper
#   • grafana     — dashboards
#
# All four share ONE bridge network (`frdcmp`), so anything co-located on this
# host — including app stacks attached to this network — can reach them by
# container name (clickhouse:8123, valkey:6379, prometheus:9090). External access
# is still via the published ports below, bound to whatever interface you set in
# .env (default 127.0.0.1; use the private-overlay IP in production, never a
# public NIC).
#
# Config & secrets live in ./.env (copy from .env.example). See README.md.
# ─────────────────────────────────────────────────────────────────────────────
name: frdcmp-infra

services:
  # ── Centralised logging ClickHouse ──────────────────────────────────────────
  # One ClickHouse server holding log data for every project stack. Each project
  # gets its OWN database + restricted user; tenants are provisioned on first
  # boot from CH_TENANTS by ./clickhouse/clickhouse/init/01-init-tenants.sh.
  clickhouse:
    container_name: frdcmp-clickhouse
    image: clickhouse/clickhouse-server:24
    restart: unless-stopped
    environment:
      # Bootstrap admin user. The init script connects as this user to create
      # the per-tenant databases/users, so it needs access management.
      - CLICKHOUSE_USER=${CLICKHOUSE_ADMIN_USER}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_ADMIN_PASSWORD}
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      # Consumed by the init script to provision tenants (db:user:password …).
      - CH_TENANTS=${CH_TENANTS}
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    # ClickHouse is cgroup-aware and caps its server memory at 0.8x of this
    # limit via ./clickhouse/clickhouse/config.d/low-resources.xml; the limit
    # itself is the hard backstop, set above that cap to leave headroom for
    # allocator RSS. memswap_limit == mem_limit → disallow swap, fail fast
    # instead of thrashing.
    mem_limit: ${CLICKHOUSE_MEM_LIMIT:-2g}
    memswap_limit: ${CLICKHOUSE_MEM_LIMIT:-2g}
    cpus: ${CLICKHOUSE_CPUS:-2}
    volumes:
      # Local data + logs under ./clickhouse/.
      - ./clickhouse/clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/clickhouse_logs:/var/log/clickhouse-server
      # Standard config overrides (read-only).
      - ./clickhouse/clickhouse/config.d/low-resources.xml:/etc/clickhouse-server/config.d/low-resources.xml:ro
      - ./clickhouse/clickhouse/config.d/network-and-logging.xml:/etc/clickhouse-server/config.d/network-and-logging.xml:ro
      # First-boot tenant provisioning.
      - ./clickhouse/clickhouse/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "clickhouse-client", "--user", "${CLICKHOUSE_ADMIN_USER}", "--password", "${CLICKHOUSE_ADMIN_PASSWORD}", "--query", "SELECT 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - frdcmp
    # NO published ports. ClickHouse is reachable ONLY on the internal `frdcmp`
    # network — in practice only by `ingest-api` (clickhouse:8123). Direct writes
    # from apps (on this or other hosts) are intentionally impossible: ALL event
    # data must enter through the ingest-api gateway, which enforces the event
    # standard. There is no direct-to-ClickHouse path and no fallback.

  # ── Shared Valkey broker ─────────────────────────────────────────────────────
  # One Valkey (Redis fork) server: central broker / cache / lock store. No real
  # multi-db isolation, so tenancy is by KEY/CHANNEL PREFIX + ACL — each service
  # is locked to `~<service>:*` keys and `&<service>:*` channels. ACL users are
  # regenerated on every boot from VK_TENANTS by ./valkey/valkey/entrypoint.sh.
  valkey:
    container_name: frdcmp-valkey
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    environment:
      # Bootstrap admin = the `default` ACL user (full access). Used by the
      # healthcheck and for ops/migration.
      - VK_ADMIN_PASSWORD=${VK_ADMIN_PASSWORD}
      # Consumed by entrypoint.sh to generate per-tenant ACL users (name:password …).
      - VK_TENANTS=${VK_TENANTS}
      # maxmemory cap, passed to valkey-server. Keep below mem_limit.
      - VK_MAXMEMORY=${VK_MAXMEMORY:-768mb}
    # entrypoint.sh builds the ACL file from VK_TENANTS, then execs valkey-server.
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    volumes:
      - ./valkey/valkey_data:/data
      - ./valkey/valkey/valkey.conf:/etc/valkey/valkey.conf:ro
      - ./valkey/valkey/entrypoint.sh:/entrypoint.sh:ro
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    # memswap_limit == mem_limit → no swap; fail fast instead of thrashing.
    mem_limit: ${VK_MEM_LIMIT:-1g}
    memswap_limit: ${VK_MEM_LIMIT:-1g}
    cpus: ${VK_CPUS:-1}
    healthcheck:
      # $$ escapes compose interpolation so the literal var reaches the shell.
      test: ["CMD-SHELL", "valkey-cli --no-auth-warning -a \"$$VK_ADMIN_PASSWORD\" ping | grep -q PONG"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - frdcmp
    # Publish ONLY the Valkey port, bound to VK_BIND. Default 127.0.0.1. In
    # production set VK_BIND to the host's private-overlay IP so workers on OTHER
    # hosts can reach it; stacks ON this host can use the internal name
    # valkey:6379. NEVER bind to a public NIC. Auth is enforced by ACL.
    ports:
      - "${VK_BIND:-127.0.0.1}:${VK_EXT_PORT:-46004}:6379"

  # ── Ingest API (telemetry gateway) ───────────────────────────────────────────
  # Apps POST batches of events here with an API key (one key → one tenant). The
  # service buffers them on the internal Valkey `ingest:events` stream and a
  # background task drains them into each tenant's ClickHouse `events` table.
  # ClickHouse/Valkey credentials never leave this host — apps only hold a key.
  # API keys live in the `ingest.ingest_keys` ClickHouse table; mint/list/revoke
  # via the admin endpoints (guarded by INGEST_ADMIN_TOKEN). See README.
  ingest-api:
    container_name: frdcmp-ingest-api
    build: ./ingest-api
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      # Co-located stores, reached by service name on the internal network.
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_ADMIN_USER=${CLICKHOUSE_ADMIN_USER}
      - CLICKHOUSE_ADMIN_PASSWORD=${CLICKHOUSE_ADMIN_PASSWORD}
      # `default` ACL user (full access) — only the ingest service touches Valkey.
      # NOTE: VK_ADMIN_PASSWORD must be URL-safe (no @ : / # in it).
      - REDIS_URL=redis://default:${VK_ADMIN_PASSWORD}@valkey:6379
      # Bearer token guarding the /v1/admin/keys endpoints. Empty = admin disabled.
      - INGEST_ADMIN_TOKEN=${INGEST_ADMIN_TOKEN}
      - RUST_LOG=${INGEST_RUST_LOG:-info}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - frdcmp
    # Publish the ingest port, bound to INGEST_BIND. Default 127.0.0.1. In
    # production set INGEST_BIND to the host's private-overlay IP so apps on
    # OTHER hosts can POST events; apps ON this host can use ingest-api:8080.
    # NEVER bind to a public NIC unless fronted by TLS — auth is the API key.
    ports:
      - "${INGEST_BIND:-127.0.0.1}:${INGEST_EXT_PORT:-46005}:8080"

  # ── Monitoring (Prometheus + Grafana) — REMOVED for now ──────────────────────
  # The prometheus + grafana services were removed from this stack. Their config
  # still lives under ./monitoring/ so they can be restored later. To bring them
  # back, re-add the two service blocks and the `prometheus_data` / `grafana_data`
  # named volumes (see git history of this file).

networks:
  frdcmp:
    driver: bridge
