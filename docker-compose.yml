# ─────────────────────────────────────────────────────────────────────────────
# clicklog — log ingestion stack
#
# One Compose project, one job: receive events over HTTP and store them in
# ClickHouse.
#
#   • ingest-api  — the ONLY entry point: validates + queues incoming events
#   • valkey      — internal queue between ingest-api and ClickHouse
#   • clickhouse  — the log store (one database per tenant)
#   • frontend    — optional admin dashboard (compose profile: dashboard)
#
# Everything shares ONE bridge network (`clicklog`). Only ingest-api (and the
# optional dashboard) publish a port — ClickHouse and Valkey are internal-only,
# reachable solely by ingest-api. Published ports bind to whatever interface
# you set in .env (default 127.0.0.1; use the private-overlay IP in production,
# never a public NIC).
#
# Config & secrets live in ./.env (copy from .env.example). See README.md.
# ─────────────────────────────────────────────────────────────────────────────
name: clicklog

services:
  # ── Centralised logging ClickHouse ──────────────────────────────────────────
  # One ClickHouse server holding log data for every project stack. Each project
  # gets its OWN database + `events` table, created on demand by the ingest-api
  # gateway. Apps never connect to CH directly.
  # No auth: like valkey, CH publishes no port and is reachable only on the
  # internal `clicklog` network — network isolation IS the access control.
  clickhouse:
    container_name: clicklog-clickhouse
    image: clickhouse/clickhouse-server:24
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    # ClickHouse is cgroup-aware and caps its server memory at 0.8x of this
    # limit via ./clickhouse/clickhouse/config.d/low-resources.xml; the limit
    # itself is the hard backstop, set above that cap to leave headroom for
    # allocator RSS. memswap_limit == mem_limit → disallow swap, fail fast
    # instead of thrashing.
    mem_limit: ${CLICKHOUSE_MEM_LIMIT:-2g}
    memswap_limit: ${CLICKHOUSE_MEM_LIMIT:-2g}
    cpus: ${CLICKHOUSE_CPUS:-2}
    volumes:
      # Local data + logs under ./clickhouse/.
      - ./clickhouse/clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/clickhouse_logs:/var/log/clickhouse-server
      # Standard config overrides (read-only).
      - ./clickhouse/clickhouse/config.d/low-resources.xml:/etc/clickhouse-server/config.d/low-resources.xml:ro
      - ./clickhouse/clickhouse/config.d/network-and-logging.xml:/etc/clickhouse-server/config.d/network-and-logging.xml:ro
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - clicklog
    # NO published ports. ClickHouse is reachable ONLY on the internal `clicklog`
    # network — in practice only by `ingest-api` (clickhouse:8123). Direct writes
    # from apps (on this or other hosts) are intentionally impossible: ALL event
    # data must enter through the ingest-api gateway, which enforces the event
    # standard. There is no direct-to-ClickHouse path and no fallback.

  # ── Valkey (internal log queue) ──────────────────────────────────────────────
  # Buffers accepted event batches for the ingest-api: the gateway XADDs onto
  # the `ingest:events` stream and a background task drains it into ClickHouse.
  # Used EXCLUSIVELY by ingest-api — no other clients, NO published port,
  # reachable only on the internal `clicklog` network as valkey:6379.
  valkey:
    container_name: clicklog-valkey
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    # No auth: valkey publishes no port and is reachable only on the internal
    # `clicklog` network — network isolation IS the access control.
    command: ["valkey-server", "/etc/valkey/valkey.conf",
              "--maxmemory", "${VK_MAXMEMORY:-768mb}"]
    volumes:
      - ./valkey/valkey_data:/data
      - ./valkey/valkey/valkey.conf:/etc/valkey/valkey.conf:ro
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    # memswap_limit == mem_limit → no swap; fail fast instead of thrashing.
    mem_limit: ${VK_MEM_LIMIT:-1g}
    memswap_limit: ${VK_MEM_LIMIT:-1g}
    cpus: ${VK_CPUS:-1}
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli ping | grep -q PONG"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - clicklog
    # NO published ports. Like ClickHouse, Valkey is reachable ONLY on the
    # internal `clicklog` network — in practice only by `ingest-api`
    # (valkey:6379). It is the gateway's queue, not a shared broker.

  # ── Ingest API (telemetry gateway) ───────────────────────────────────────────
  # Apps POST batches of events here with an API key (one key → one tenant). The
  # service buffers them on the internal Valkey `ingest:events` stream and a
  # background task drains them into each tenant's ClickHouse `events` table.
  # ClickHouse/Valkey credentials never leave this host — apps only hold a key.
  # API keys live in the `ingest.ingest_keys` ClickHouse table; mint/list/revoke
  # in the admin dashboard (JWT-guarded admin endpoints). See README.
  ingest-api:
    container_name: clicklog-ingest-api
    build: ./ingest-api
    restart: unless-stopped
    depends_on:
      clickhouse:
        condition: service_healthy
      valkey:
        condition: service_healthy
    environment:
      # Co-located stores, reached by service name on the internal network.
      # Both are internal-only and unauthenticated (network isolation is the
      # gate) — only this service can reach them.
      - CLICKHOUSE_URL=http://clickhouse:8123
      - REDIS_URL=redis://valkey:6379
      # Admin dashboard: single seeded identity + HS256 JWT signing secret.
      # Empty JWT_SECRET disables /v1/admin/login (dashboard auth).
      - JWT_SECRET=${JWT_SECRET}
      - JWT_TTL_HOURS=${JWT_TTL_HOURS:-24}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - RUST_LOG=${INGEST_RUST_LOG:-info}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - clicklog
    # Publish the ingest port, bound to INGEST_BIND. Default 127.0.0.1. In
    # production set INGEST_BIND to the host's private-overlay IP so apps on
    # OTHER hosts can POST events; apps ON this host can use ingest-api:8080.
    # NEVER bind to a public NIC unless fronted by TLS — auth is the API key.
    ports:
      - "${INGEST_BIND:-127.0.0.1}:${INGEST_EXT_PORT:-46005}:8080"

  # ── Admin dashboard (React SPA + nginx) — OPTIONAL, profile: dashboard ───────
  # A static React build served by nginx, which also reverse-proxies /v1 + /health
  # to the ingest-api on the internal network (same-origin → no CORS). Kept behind
  # a compose profile so the core logging stack stays decoupled from a UI build.
  #   Start with it:   docker compose --profile dashboard up -d
  #   Rebuild it:      docker compose --profile dashboard build frontend
  frontend:
    container_name: clicklog-frontend
    build: ./frontend
    restart: unless-stopped
    profiles: ["dashboard"]
    depends_on:
      ingest-api:
        condition: service_healthy
    networks:
      - clicklog
    # Publish the dashboard, bound to FRONTEND_BIND. Default 127.0.0.1. In
    # production set FRONTEND_BIND to the host's private-overlay IP so admins on
    # OTHER hosts can reach it. NEVER bind to a public NIC (auth is a JWT only).
    ports:
      - "${FRONTEND_BIND:-127.0.0.1}:${FRONTEND_EXT_PORT:-46006}:80"

networks:
  clicklog:
    driver: bridge
