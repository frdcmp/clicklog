# nginx config for the admin dashboard.
#   • serves the static SPA build with a client-side-routing fallback
#   • reverse-proxies /v1 + /health to ingest-api on the internal frdcmp network
# so the browser stays same-origin (no CORS, no build-time API URL).

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Body cap matching the ingest-api payload limit (batched events).
    client_max_body_size 8m;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # Hashed build assets are immutable — cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API → ingest-api (container name on the shared network). Covers both
    # /v1/admin/* (dashboard) and /v1/events|stats (app-facing).
    location /v1/ {
        proxy_pass http://ingest-api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location = /health {
        proxy_pass http://ingest-api:8080/health;
    }

    # SPA fallback: unknown paths return index.html for React Router.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
