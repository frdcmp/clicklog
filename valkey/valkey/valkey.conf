# ─────────────────────────────────────────────────────────────────────────────
# Config for the internal log queue Valkey.
#
# Used EXCLUSIVELY by ingest-api as its event buffer (`ingest:events` stream).
# There is NO auth: valkey publishes no host port and is reachable only on the
# internal `clicklog` docker network — network isolation IS the access control.
# ─────────────────────────────────────────────────────────────────────────────

# Listen on the container interface. The only reachable surface is the internal
# `clicklog` docker network (valkey:6379), in practice only ingest-api.
# protected-mode must be off so ingest-api can connect without a password.
bind 0.0.0.0
port 6379
protected-mode no
tcp-keepalive 60

# ── Durability ──
# This is the durable buffer for accepted events (Redis Streams), so persist to
# disk. AOF for per-second durability + periodic RDB snapshots.
appendonly yes
appendfsync everysec
dir /data
save 900 1
save 300 10
save 60 10000

# ── Memory ──
# maxmemory is supplied via --maxmemory (VK_MAXMEMORY) at launch.
# noeviction: never silently drop queued events — a full instance ERRORS on
# write rather than evicting stream data. The ingest stream is capped
# (XADD MAXLEN) by the gateway, so it cannot grow without bound.
maxmemory-policy noeviction

loglevel notice
