# ─────────────────────────────────────────────────────────────────────────────
# Base config for the decalitro shared Valkey.
#
# Users/ACLs are NOT defined here — they are generated at startup from
# VK_TENANTS by entrypoint.sh and passed via --aclfile. Do NOT set `requirepass`
# here: it is mutually exclusive with an aclfile (the `default` user's password
# comes from the generated ACL file instead).
# ─────────────────────────────────────────────────────────────────────────────

# Listen on the container interface so Docker can forward the published port.
# The only reachable surface is the single published port in docker-compose.yml,
# bound to VK_BIND (the private overlay IP in prod). protected-mode is therefore safe to
# disable; access is still gated by ACL passwords.
bind 0.0.0.0
port 6379
protected-mode no
tcp-keepalive 60

# ── Durability ──
# This is a broker (Redis Streams + queues), so persist to disk. AOF for
# per-second durability + periodic RDB snapshots.
appendonly yes
appendfsync everysec
dir /data
save 900 1
save 300 10
save 60 10000

# ── Memory ──
# maxmemory is supplied via --maxmemory (VK_MAXMEMORY) at launch.
# noeviction: never silently drop keys — a full instance ERRORS on write rather
# than evicting stream/queue data. Cache keys MUST therefore carry a TTL (see
# README) so they expire on their own and don't fill the instance.
maxmemory-policy noeviction

loglevel notice
