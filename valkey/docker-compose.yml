# ─────────────────────────────────────────────────────────────────────────────
# Shared Valkey broker — decalitro
#
# A single Valkey (Redis fork) server acting as the central message broker /
# cache / lock store for every project on the decalitro stack (app_one,
# app_two, … any number of services).
#
# Valkey has no real multi-database isolation (numbered DBs share ACLs and
# pub/sub), so tenancy is enforced by KEY/CHANNEL PREFIX + ACL: each service
# gets an ACL user locked to `~<service>:*` keys and `&<service>:*` channels.
# EVERY key, stream and channel a service uses MUST start with `<service>:`.
# See README.md → "Key & channel naming standard".
#
# ACL users are generated on every boot from VK_TENANTS in .env by
# ./valkey/entrypoint.sh (written to an --aclfile). .env is the source of truth.
# ─────────────────────────────────────────────────────────────────────────────
name: decalitro-valkey

services:
  valkey:
    container_name: decalitro-valkey
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    environment:
      # Bootstrap admin = the `default` ACL user (full access). Used by the
      # healthcheck and for ops/migration.
      - VK_ADMIN_PASSWORD=${VK_ADMIN_PASSWORD}
      # Consumed by entrypoint.sh to generate per-tenant ACL users (name:password …).
      - VK_TENANTS=${VK_TENANTS}
      # maxmemory cap, passed to valkey-server. Keep below mem_limit.
      - VK_MAXMEMORY=${VK_MAXMEMORY:-768mb}
    # entrypoint.sh builds the ACL file from VK_TENANTS, then execs valkey-server.
    entrypoint: ["/bin/sh", "/decalitro-entrypoint.sh"]
    volumes:
      - ./valkey_data:/data
      - ./valkey/valkey.conf:/etc/valkey/valkey.conf:ro
      - ./valkey/entrypoint.sh:/decalitro-entrypoint.sh:ro
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    # memswap_limit == mem_limit → no swap; fail fast instead of thrashing.
    mem_limit: ${VK_MEM_LIMIT:-1g}
    memswap_limit: ${VK_MEM_LIMIT:-1g}
    cpus: ${VK_CPUS:-1}
    healthcheck:
      # $$ escapes compose interpolation so the literal var reaches the shell.
      test: ["CMD-SHELL", "valkey-cli --no-auth-warning -a \"$$VK_ADMIN_PASSWORD\" ping | grep -q PONG"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - network
    # Publish ONLY the Valkey port, on a single high port, bound to VK_BIND.
    # Default 127.0.0.1 (localhost-only). On decalitro set VK_BIND=172.25.3.220
    # (its the private overlay IP) so project workers reach it over the overlay.
    # NEVER bind to the public NIC (176.123.2.138). Auth is enforced by ACL.
    ports:
      - "${VK_BIND:-127.0.0.1}:${VK_EXT_PORT:-46004}:6379"

networks:
  network:
    driver: bridge
